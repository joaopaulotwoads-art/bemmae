valuesTitle: Nossos valores
values:
  - icon: ⚖️
    title: Avaliação com pé no chão
    description: Textos pensados para quem compra no Brasil. Peso, Inmetro, porta-malas e calçada entram na conversa, não só foto bonita de catálogo.
  - icon: 🔍
    title: Pesquisa antes de publicar
    description: Leio ficha, manual e reclamações recorrentes antes de recomendar. Quando algo depende do anúncio ou do lote, deixo isso explícito no artigo.
  - icon: 💬
    title: Linguagem acessível
    description: Explico termos técnicos quando aparecem e evito julgar a escolha da família. O objetivo é clareza para quem está cansado de jargão de loja.
processTitle: Nosso processo de análise
processSteps:
  - title: Escolha do tema
    body: Priorizo dúvidas que aparecem de verdade na vida de quem tem bebê pequeno, de carrinho compacto a travel system e cadeira para auto.
  - title: Cruzamento de informação
    body: Reúno dados de fabricante, selo quando há, medidas e relatos de uso para não depender só do marketing.
  - title: Redação do guia
    body: Organizo prós, contras e perguntas que costumam surgir na hora de clicar em comprar ou ir à loja.
  - title: Atualização quando faz sentido
    body: Quando linha muda de nome, preço ou kit, volto ao texto para alinhar o que o leitor encontra hoje no varejo.
body: |-
  Seja bem-vinda ou bem-vindo ao Bem Mãe. Aqui falo de carrinhos de bebê, cadeiras para auto, rotina e tudo o que está ligado ao dia a dia com os pequenos, sempre com linguagem simples e sem julgamento. Gosto de ajudar outras famílias a encontrar equipamento e decisões que façam sentido para aproveitar momentos em casa e na rua, e dedico tempo a pesquisar antes de publicar análise ou lista.

  O Bem Mãe nasceu para compartilhar experiência de verdade. Quando tive minha primeira filha, não tinha noção clara de qual carrinho ou conjunto faria sentido para a nossa realidade. Modelo, peso, compatibilidade com o carro e marca eram um turbilhão de dúvidas. Com o tempo fui organizando o que aprendi e percebi que muitos pais, principalmente de primeira viagem, passam pelo mesmo. Por isso este blog existe, para quem está começando e não sabe por onde ir, e também para quem já tem prática mas quer comparar opções com calma.

  Você encontra reviews, comparativos e artigos informativos. Eu invisto tempo em pesquisa e leitura de ficha técnica para que o texto ajude a decidir com mais segurança. O conteúdo é pensado para quem inicia no tema e para quem já pesquisa há um tempo. Não infantiliza. Explico o que importa de forma direta.

  Quando há ofertas ou novidades que valem a pena, também compartilho. Se quiser conversar ou sugerir um tema, use a página de contato.
teamSectionTitle: Nossa equipe
