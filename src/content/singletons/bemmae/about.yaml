heroTitle: Nossa missão é ajudar você a comprar melhor para o bebê
heroSubtitle: O Bem Mãe é um guia para mães, pais e cuidadores que querem comparar carrinhos, cadeiras para auto e enxoval com informação honesta, linguagem clara e foco no dia a dia brasileiro.
heroImage: ""
heroImagePlaceholder: ""
valuesTitle: Nossos valores
values:
  - icon: ⚖️
    title: Avaliação com pé no chão
    description: Textos pensados para quem compra no Brasil. Peso, Inmetro, porta-malas e calçada entram na conversa, não só foto bonita de catálogo.
  - icon: 🔍
    title: Pesquisa antes de publicar
    description: Leio ficha, manual e reclamações recorrentes antes de recomendar. Quando algo depende do anúncio ou do lote, deixo isso explícito no artigo.
  - icon: 💬
    title: Linguagem acessível
    description: Explico termos técnicos quando aparecem e evito julgar a escolha da família. O objetivo é clareza para quem está cansado de jargão de loja.
processTitle: Nosso processo de análise
processSteps:
  - title: Escolha do tema
    body: Priorizo dúvidas que aparecem de verdade na vida de quem tem bebê pequeno, de carrinho compacto a travel system e cadeira para auto.
  - title: Cruzamento de informação
    body: Reúno dados de fabricante, selo quando há, medidas e relatos de uso para não depender só do marketing.
  - title: Redação do guia
    body: Organizo prós, contras e perguntas que costumam surgir na hora de clicar em comprar ou ir à loja.
  - title: Atualização quando faz sentido
    body: Quando linha muda de nome, preço ou kit, volto ao texto para alinhar o que o leitor encontra hoje no varejo.
teamSectionTitle: Conheça nossos especialistas
teamMembers:
  - name: Vitória Caroline
    badge: Fundadora
    role: Voz principal do Bem Mãe
    bio: Mãe de primeira viagem, criou o Bem Mãe para ajudar outras mães e pais a escolherem os melhores produtos para o bebê. Compartilha pesquisas, comparações e dicas práticas sobre carrinhos, fraldas e acessórios infantis para facilitar as escolhas do dia a dia.
    photo: /authors/vitoria-caroline-barbosa.png
    href: /authors/vitoria-caroline
  - name: Equipe Editorial
    badge: Revisão
    role: Revisão e curadoria de conteúdo
    bio: Antes de publicar, cada artigo passa por uma revisão de dados técnicos, normas do INMETRO e informações de fabricante. O objetivo é garantir que o que você lê aqui seja preciso e útil na hora de decidir.
    emoji: 📋
ctaBannerTitle: Pronta para fazer a melhor escolha?
